# V2 — Feature-First Gradient Boosting
# =====================================

trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
  primary_timeframe: 1h

data:
  storage_path: ./data
  db_path: ./data/v2.duckdb
  # How much data to fetch (days)
  fetch_days: 1095          # ~3 years
  # How much data to use for training (days) — start small, iterate fast
  train_days: 365            # 1 year
  # Exchange for CCXT fetching (public data, no API key needed)
  exchange: coinbase

risk:
  max_position_pct: 0.10
  max_total_exposure_pct: 0.50
  max_drawdown_pct: 0.15
  stop_loss_pct: 0.03
  take_profit_pct: 0.06
  kelly_fraction: 0.25

models:
  lgbm:
    enabled: true
    prediction_horizon: 12    # bars ahead (12h with 1h candles)
    direction_threshold: 0.005  # ±0.5% move = UP/DOWN, else FLAT
    # Defaults — Optuna will tune these later
    n_estimators: 500
    max_depth: 6
    num_leaves: 31
    learning_rate: 0.05
    min_child_samples: 100
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.1
    reg_lambda: 1.0

validation:
  n_splits: 5
  train_size: 5000            # bars per training window
  test_size: 500              # bars per test window
  purge_gap: 12               # must be >= prediction_horizon
  embargo_pct: 0.01

execution:
  mode: paper
