# V3 starter configuration

trading:
  pairs:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  primary_timeframe: 1h

transport:
  mode: in_memory
  max_queue_size: 10000

strategy:
  long_score_threshold: 0.60
  short_score_threshold: 0.35
  short_requires_bear_regime: true
  allow_event_overlay: true
  default_order_type: limit

execution:
  venue: kraken
  validate_orders: true
  default_leverage: 2
  base_size_fraction: 0.10

kraken:
  api_key_env: KRAKEN_API_KEY
  api_secret_env: KRAKEN_API_SECRET
  use_margin: false
  dead_man_timeout_sec: 90

server:
  owner: decision_engine
  persist_signal_log: true

paper:
  model_variant: auto
  trend_profile: auto
  preferred_profile_1x: aggressive_v2_trend_balanced
  preferred_profile_2x: aggressive_v2_trend_balanced_top2
  enforce_drawdown_guardrail: true
  drawdown_cap_1x: -12.0
  drawdown_cap_2x: -20.1
  enforce_edge_gate_when_ml_off: false
  history_days: 1095
  walkforward_summary_path: v3/data/walkforward/hybrid_overlay_walkforward_summary.json
  return_max_summary_path: v3/data/walkforward/return_max_walkforward_summary.json
  artifact_path: v3/data/paper/latest_paper_cycle.json
  cycle_log_path: v3/data/paper/paper_cycles.jsonl
  optimization_summary_path: v3/data/optimization/funding_premium_threshold_optimization.json
  use_optimized_thresholds: true
  skip_if_same_candle: true
  loop_interval_sec: 300

optimization:
  default_calibration_method: isotonic
  calibration_fraction: 0.2
  summary_path: v3/data/optimization/funding_premium_threshold_optimization.json

premium:
  venue: coinbase
  timeframe: 1h
  output_dir: v3/data/coinbase

polymarket:
  gamma_base_url: https://gamma-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  user_agent: MFT-Cashcow-v3/0.1
  timeout_sec: 30
  default_interval: 1h
  default_fidelity: 60
  output_dir: v3/data/polymarket
